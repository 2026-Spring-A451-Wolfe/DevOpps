<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link rel="stylesheet" href="Infrastructure-Reporter.css">
</head>

<body>
    <!-- Top Navigation Bar -->
    <header class="top-bar">
        <div class="top-bar__menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <h1 class="top-bar__title">Register your Account!</h1>

        <div class="top-bar__profile">Profile</div>
    </header>

    <!-- Submission Hero 
     Borrowed from submission because it's a good header, looks more cohesive-->
    <section class="submission-hero">
        <h2 class="submission-hero__title">Sign Up for an Account</h2>
        <p class="submission-hero__subtitle">Thank you for your interest in helping to repair the city!</p>
        <p class="submission-hero__subtitle">Sign up to <span style="color: #213d55;">send in reports</span> and <span style="color: #213d55;">track their status.</span></p>
    </section>

    <!-- User Registration boxes-->
     <main class="registration-section">
        <!-- sign-up bars-->
        <input class="registration-section__input"
            type="email" 
            placeholder="Email address:">
        <input class="registration-section__input"
            type="password" 
            placeholder="Password:">
        <input class="registration-section__input"
            type="password" 
            placeholder="Re-enter password:">
            <!--need to figure out how to check for password match
            but that is later; this is just for basic concept-->

        <button class="registration-section__button">
            Sign up!
        </button> <!--big signup button-->

        <p class="confirmation">
            A confirmation email will be sent to the provided email address.
        </p>
    </main>

    <footer class="main-footer"></footer>
    
</body>
</html>
