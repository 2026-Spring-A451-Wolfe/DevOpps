<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Road Report</title>
  <link rel="stylesheet" href="Infrastructure-Reporter.css">
  <link rel="stylesheet" href="login-page.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <header class="top-bar">
        <div class="top-bar__menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <h1 class="top-bar__title">NOLA Road Reporter</h1>

        <div class="top-bar__profile">Profile</div>
    </header>

  <!-- Hero Section -->
  <section class="login-hero">
    <h2 class="login-hero__title">Welcome Back</h2>
    <p class="login-hero__subtitle">
      Sign in to submit and track road reports.
    </p>
  </section>

  <!-- Login Card -->
  <main>
    <form class="login-card">
      <h3 class="login-card__title">Login</h3>

      <input 
        type="username" 
        class="login-card__input" 
        placeholder="Username" 
        required
      >

      <input 
        type="password" 
        class="login-card__input" 
        placeholder="Password" 
        required
      >

      <button type="submit" class="login-card__button">
        Login
      </button>

      <div class="login-card__footer">
        Don't have an account?
        <a href="userRegistration.html" class="login-card__link">Sign Up</a>
      </div>
    </form>
  </main>
  <!-- MAP SECTION -->
<section class="map-section">
  <h2 class="map-section__title">Reported Potholes in NOLA</h2>
  <div id="map"></div>
</section>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([29.9511, -90.0715], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Example pothole markers
  const potholes = [
    { lat: 29.9511, lng: -90.0715, desc: "Large pothole near Canal St." },
    { lat: 29.9430, lng: -90.0820, desc: "Cracked pavement by Magazine St." },
    { lat: 29.9600, lng: -90.1000, desc: "Deep pothole near City Park." }
  ];

  potholes.forEach(pothole => {
    L.marker([pothole.lat, pothole.lng])
      .addTo(map)
      .bindPopup(`<b>Pothole Report</b><br>${pothole.desc}`);
  });
</script>

<footer class="main-footer">
    loyola university new orleans swe class project etc etc
</footer>
<script src="shared-hamburger-menu.js"></script>

</body>
</html>
