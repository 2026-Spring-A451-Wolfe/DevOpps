<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <title>Submit Report</title>
    <link rel="stylesheet" href="Infrastructure-Reporter.css">
    <link rel="stylesheet" href="submission-page.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <header class="top-bar">
        <div class="top-bar__menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <h1 class="top-bar__title">Submit a Road Report</h1>

        <div class="top-bar__profile">Profile</div>
    </header>
    <nav class="sub-nav">
        <a href="dashboard-page.html">Dashboard</a>
        <a href="report-tracking-page.html">Reports</a>
        <a href="updates-page.html">Updates</a>
    </nav>

    <div class="layout">

    <!-- Submission Hero -->
    <section class="submission-hero">
        <h2 class="submission-hero__title">Found a road issue? Report it below.</h2>
        <p class="submission-hero__subtitle">Help keep NOLA roads safe and smooth.</p>
    </section>

    <!-- Submission Form -->
    <main class="submission-form">

        <section class="report-section">
            <h2 class="report-section__title">Upload Photo Evidence</h2>
            <input type="file" class="report-section__input" placeholder="Choose a file...">
        </section>

        <section class="report-section">
            <h2 class="report-section__title">Describe the Issue</h2>
            <textarea class="report-section__textarea" rows="4" placeholder="Provide brief description of the issue..."></textarea>
        </section>

        <section class="report-section">
            <h2 class="report-section__title">Select Location on Map</h2>
            <div class="report-section__map">(MAP)</div>
        </section>

        <section class="report-section">
            <h2 class="report-section__title">Submit Report</h2>
            <button class="report-section__submit">Submit Report</button>
        </section>

    </main>
    
    </div>

    <footer class="main-footer">
        loyola university new orleans swe class project etc etc
    </footer>
    <script src="shared-hamburger-menu.js"></script>
</body>
</html>
