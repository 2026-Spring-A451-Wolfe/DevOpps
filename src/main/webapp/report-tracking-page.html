<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Report Tracker</title>
    <link rel="stylesheet" href="Infrastructure-Reporter.css">
</head>

<body>

    <!-- Top Navigation Bar -->
    <header class="top-bar">
        <div class="top-bar__menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <h1 class="top-bar__title">Placeholder Title</h1>
        <div class="top-bar__profile">Profile</div>
    </header>
    <nav class="sub-nav">
        <a href="dashboard-page.html">Dashboard</a>
        <a href="report-tracking-page.html">Reports</a>
        <a href="updates-page.html">Updates</a>
    </nav>

    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar__profile-circle">Profile</div>

            <ul class="sidebar__nav">
                <li>User Information (Name / Email)</li>
            </ul>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="content">
            <h2 class="content__title">Report Tracker</h2>
            <div class="content__divider"></div>

            <!-- REPORT CARD -->
            <div class="report-card">
                <div class="report-card__image">
                    Picture of what they submitted
                </div>

                <div class="report-card__info">
                    <p><strong>Report name:</strong></p>
                    <p>Report Description</p>

                    <div class="progress">
                        <div class="progress__labels">
                            <span>Submitted</span>
                            <span>Processed</span>
                            <span>Under Review</span>
                            <span>Completed</span>
                        </div>

                        <div class="progress__bar">
                            <div class="progress__fill"></div>
                        </div>
                    </div>

                    <button class="report-card__btn">View Report</button>
                </div>
            </div>
        </main>
    </div>
    <footer class="main-footer">
        loyola university new orleans swe class project etc etc
    </footer>
    

    <script src="reports.js"></script>
    
</html>
</body>

</html>
